<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Test — Bank Website</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #1a3a6b; color: white; padding: 16px 32px; font-size: 22px; font-weight: bold; }
    .hero { padding: 60px 32px; max-width: 800px; margin: 0 auto; }
    h2 { color: #1a3a6b; }
    p { color: #555; line-height: 1.7; margin-top: 12px; }
  </style>
</head>
<body>

  <header>🏦 My Bank — Official Website</header>

  <div class="hero">
    <h2>Welcome to My Bank</h2>
    <p>We offer a full range of personal and business banking services. Our team is here to help you 24/7.</p>
    <p>Click the chat button in the bottom-right corner to talk to our support team.</p>
  </div>

  <!-- ✅ Chat widget embed — points to FastAPI on port 8000 -->
  <script
    src="http://localhost:8000/static/widget.js"
    data-base-url="http://localhost:8000"
    data-bank-name="My Bank Support">
  </script>

</body>
</html>
