<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard — Bank Live Chat</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<!-- ── Login Screen ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="48" height="48">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <h2>Agent Dashboard</h2>
      <p>Bank Live Chat Support</p>
    </div>
    <div class="form-group">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────────────────────────── -->
<div id="app-screen">
  <div class="top-bar">
    <h1>Live Chat Dashboard</h1>
    <div class="top-bar-right">
      <span class="agent-name" id="agent-name-display"></span>
      <button id="logout-btn">Sign Out</button>
    </div>
  </div>

  <div class="main-body">
    <!-- Session list -->
    <div class="session-panel">
      <div class="session-panel-header">
        <h3>Active Chats</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="session-count">0</span>
          <button id="refresh-btn" title="Refresh" style="background:none;border:none;cursor:pointer;padding:2px;color:#888;display:flex;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="session-list"></div>
    </div>

    <!-- Chat area -->
    <div class="chat-panel" id="chat-panel">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Select a chat to start</p>
      </div>

      <div id="chat-view" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="chat-panel-header">
          <h3 id="chat-panel-title">Chat</h3>
          <div class="header-actions">
            <button class="btn-takeover" id="btn-takeover">Take Over</button>
            <button class="btn-close-chat" id="btn-close-chat">End Chat</button>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
          <textarea id="agent-msg-input" placeholder="Type your reply..." rows="1"></textarea>
          <button id="agent-send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="dashboard.js" data-api-url="http://localhost:8000"></script>
</body>
</html>
